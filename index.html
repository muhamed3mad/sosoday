<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Birthday Login 🎂</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    font-family:Arial, sans-serif;
}

.login-box{
    background:rgba(255,255,255,0.9);
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    width:320px;
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
    color:#ff4da6;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    font-size:14px;
}

.login-box button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ff4da6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-box button:hover{
    background:#e60073;
}

.error{
    color:red;
    margin-top:10px;
    display:none;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🎂 Birthday Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkLogin()">Login</button>
    <div class="error" id="errorMsg">Wrong Username or Password ❌</div>
</div>

<script>
function checkLogin(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === "soso" && pass === "02032006"){
        window.location.href = "birthday.html";
    }else{
        document.getElementById("errorMsg").style.display="block";
    }
}
</script>

</body>
</html>
